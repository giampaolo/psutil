# Runs CI tests and generates wheels on the following platforms:
# * Linux
# * macOS
# * Windows
#
# Useful URLs:
# * https://github.com/pypa/cibuildwheel
# * https://github.com/actions/checkout
# * https://github.com/actions/setup-python
# * https://github.com/actions/upload-artifact

on:
  workflow_dispatch:
  push:
    paths-ignore:
      - "docs/**"
  pull_request:
    paths-ignore:
      - "docs/**"
name: build
concurrency:
  # Cancel build if a new one starts, but don't interrupt all jobs on the first
  # failure.
  group: build-${{ github.ref }}
  cancel-in-progress: true
jobs:

  # Run tests on Linux, macOS, Windows
  tests:
    name: "${{ matrix.os }}, ${{ matrix.arch }}"
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, arch: x86_64 }
          - { os: ubuntu-24.04-arm, arch: aarch64 }
          - { os: macos-15, arch: x86_64 }
          - { os: macos-15, arch: arm64, python: "3.8" } # universal2
          - { os: windows-2025, arch: AMD64 }
          - { os: windows-11-arm, arch: ARM64, python: "3.13" }
    steps:
      - uses: actions/checkout@v7

      # Host Python only launches cibuildwheel. Default 3.11; some jobs
      # override matrix.python to hit their runner's toolcache.
      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python || '3.11' }}

      # Cache the CPython interpreters cibuildwheel downloads, so later
      # pushes reuse them. Linux gets them from the container, so skip it.
      - name: Cache cibuildwheel interpreters
        if: runner.os != 'Linux'
        uses: actions/cache@v4
        with:
          path: |
            ~/AppData/Local/pypa/cibuildwheel/Cache
            ~/Library/Caches/cibuildwheel
          key: cibw-${{ runner.os }}-${{ matrix.arch }}-${{ hashFiles('.github/workflows/build.yml', 'pyproject.toml') }}
          restore-keys: |
            cibw-${{ runner.os }}-${{ matrix.arch }}-

      - name: Build wheels + run tests
        uses: pypa/cibuildwheel@v3.4.1
        env:
          CIBW_ARCHS: "${{ matrix.arch }}"
          CIBW_ENABLE: "cpython-freethreading ${{ startsWith(github.ref, 'refs/tags/') && '' || 'cpython-prerelease' }}"
          # Full matrix only on master and tags. Everywhere else (PRs,
          # branches) build a lean subset: shipped abi3 wheel (3.8),
          # full-tested 3.14, free-threaded 3.14.
          CIBW_BUILD: "${{ (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/')) && '*' || 'cp38-* cp314-* cp314t-*' }}"
          # Test against psleak git master (not the released PyPI version).
          # Runs before .[test], so its unpinned psleak is left satisfied.
          CIBW_BEFORE_TEST: "pip install git+https://github.com/giampaolo/psleak.git"

      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.arch }}
          path: wheelhouse

  # Run linters
  linters:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: 3.x
      - name: "Run linters"
        run: |
          make ci-lint

  # Merge wheels and check sanity of the package distribution.
  merge-and-check-dist:
    needs: [tests]
    # Runs only on master + tags, where the full wheel set is built
    # (it asserts that full set is present).
    if: github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: 3.x
      - uses: actions/upload-artifact/merge@v7
        with:
          name: wheels
          pattern: wheels-*
          separate-directories: false
          delete-merged: true
      - uses: actions/download-artifact@v8
        with:
          name: wheels
          path: wheelhouse
      - run: |
          make ci-check-dist
