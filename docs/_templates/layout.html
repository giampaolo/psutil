{% extends "!layout.html" %}
{% block extrahead %}
{{ super() }}

<!-- apply saved theme before first paint to avoid flash -->
<script>
  (function () {
    if (localStorage.getItem('psutil-theme') === 'dark')
      document.documentElement.setAttribute('data-theme', 'dark');
  })();
</script>

<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-G7374TFB11"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-G7374TFB11');
</script>
{% endblock %}

{% block sidebartitle %}
{{ super() }}
<div class="sidebar-theme-switch">
  <label class="theme-switch" title="Toggle dark/light theme">
    <input type="checkbox" id="theme-toggle" autocomplete="off">
    <span class="theme-switch-track">
      <span class="theme-switch-icon theme-switch-sun"><i class="fa fa-sun-o"></i></span>
      <span class="theme-switch-icon theme-switch-moon"><i class="fa fa-moon-o"></i></span>
      <span class="theme-switch-thumb"></span>
    </span>
  </label>
</div>
{% endblock %}
