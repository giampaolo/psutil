{%- extends "!search.html" %}

{# Override the search page to add a search input at the top. #}
{% block body %}

  <h1>Search</h1>
  <form class="search-page-form" action="search.html" method="get">
    <i class="fa fa-search search-page-icon" aria-hidden="true"></i>
    <input type="text"
           name="q"
           class="search-page-input"
           autofocus
           autocomplete="off"
           placeholder="{{ _('Search the docs') }}…"
           aria-label="{{ _('Search the docs') }}">
    <button type="submit" class="search-page-btn">{{ _('Search') }}</button>
    <input type="hidden" name="check_keywords" value="yes">
    <input type="hidden" name="area" value="default">
  </form>

  <script>
    (function () {
      var input = document.querySelector('.search-page-input');
      if (!input) { return; }
      var q = new URLSearchParams(window.location.search).get('q');
      if (q) { input.value = q; }
    })();
  </script>

  {{ super() }}
{% endblock %}
