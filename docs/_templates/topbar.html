<header class="top-bar">
  <div class="top-bar-inner">
    <a class="top-bar-logo" href="{{ pathto(master_doc) }}">
      <img src="{{ pathto('_static/images/logo-psutil.svg', 1) }}" alt="psutil logo">
      <span>psutil</span>
    </a>
    <div class="top-bar-actions">
      <a class="top-bar-text" href="{{ pathto('blog') }}">Blog</a>
      <button id="theme-toggle" class="top-bar-btn" title="Toggle dark mode (Shift+D)">
        <i class="fa fa-moon-o" id="theme-icon"></i>
      </button>
      <a class="top-bar-link" href="https://github.com/giampaolo/psutil" title="GitHub" target="_blank" rel="noopener">
        <i class="fa fa-github"></i>
      </a>
      <a class="top-bar-version" href="https://pypi.org/project/psutil" title="PyPI" target="_blank" rel="noopener">v{{ release }}</a>
    </div>
  </div>
</header>
