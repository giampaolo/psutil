<header class="top-bar">
  <div class="top-bar-inner">
    <a class="top-bar-logo" href="{{ pathto(master_doc) }}">
      <img src="{{ pathto('_static/images/logo-psutil.svg', 1) }}" alt="psutil logo">
      <span>psutil</span>
    </a>
    <div class="top-bar-actions">
      <a class="top-bar-text" href="{{ pathto('blog') }}">Blog</a>
      <button id="theme-toggle" class="top-bar-btn" title="Toggle dark mode (Shift+D)">
        <i class="fa fa-moon-o" id="theme-icon"></i>
      </button>
      <a class="top-bar-link top-bar-github" href="https://github.com/giampaolo/psutil" title="GitHub" target="_blank" rel="noopener">
        <i class="fa fa-github"></i>
        <span class="github-stars" id="github-stars" data-repo="giampaolo/psutil"></span>
      </a>
      <a class="top-bar-version" id="github-version" data-repo="giampaolo/psutil" href="https://pypi.org/project/psutil" title="PyPI" target="_blank" rel="noopener"></a>
    </div>
  </div>
</header>
